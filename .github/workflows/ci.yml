name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend package and stable tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            backend/*.gradle*
            backend/gradle/wrapper/gradle-wrapper.properties
      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x gradlew
      - name: Run stable backend tests
        working-directory: backend
        run: >-
          ./gradlew --no-daemon test
          --tests 'com.project.backend.app.openai.*'
          --tests 'com.project.backend.app.storage.*'
          --tests 'com.project.backend.common.sanitizer.*'
          --tests 'com.project.backend.features.system.mail.*'
          --tests 'com.project.backend.features.system.report.*'
      - name: Package backend
        working-directory: backend
        run: ./gradlew --no-daemon clean bootJar -x test

  frontend:
    name: Frontend production build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build-only
