name: Deploy DEV

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY DEV to deploy this revision
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: project-admin-dev-deployment
  cancel-in-progress: false

jobs:
  verify:
    name: Verify deployable revision
    if: ${{ inputs.confirmation == 'DEPLOY DEV' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            backend/*.gradle*
            backend/gradle/wrapper/gradle-wrapper.properties
      - name: Run stable backend tests
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon test \
            --tests 'com.project.backend.app.openai.*' \
            --tests 'com.project.backend.app.storage.*' \
            --tests 'com.project.backend.common.sanitizer.*' \
            --tests 'com.project.backend.features.system.mail.*' \
            --tests 'com.project.backend.features.system.report.*'
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build-only

  deploy:
    name: Build images and deploy
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment:
      name: dev
      url: https://project-admin.fuyo-system.com
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      APP_INSTANCE_ID: ${{ vars.APP_INSTANCE_ID }}
      DOCUMENT_BUCKET_NAME: ${{ vars.DOCUMENT_BUCKET_NAME }}
      BACKEND_REPOSITORY: ${{ vars.BACKEND_REPOSITORY }}
      FRONTEND_REPOSITORY: ${{ vars.FRONTEND_REPOSITORY }}
      APPLICATION_URL: ${{ vars.APPLICATION_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate deployment variables
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          for name in AWS_DEPLOY_ROLE_ARN AWS_REGION AWS_ACCOUNT_ID APP_INSTANCE_ID \
            DOCUMENT_BUCKET_NAME BACKEND_REPOSITORY FRONTEND_REPOSITORY APPLICATION_URL; do
            if [[ -z "${!name:-}" ]]; then
              echo "GitHub dev Environment variable is missing: ${name}" >&2
              exit 1
            fi
          done
      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: project-admin-${{ github.run_id }}
          mask-aws-account-id: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to Amazon ECR
        run: >-
          aws ecr get-login-password --region "${AWS_REGION}"
          | docker login --username AWS --password-stdin
          "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - name: Prepare immutable image names
        run: |
          image_tag="sha-${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          registry="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "BACKEND_IMAGE=${registry}/${BACKEND_REPOSITORY}:${image_tag}" >> "${GITHUB_ENV}"
          echo "FRONTEND_IMAGE=${registry}/${FRONTEND_REPOSITORY}:${image_tag}" >> "${GITHUB_ENV}"
      - name: Build and push backend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha,scope=project-admin-backend
          cache-to: type=gha,mode=max,scope=project-admin-backend
      - name: Build and push frontend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ env.FRONTEND_IMAGE }}
          cache-from: type=gha,scope=project-admin-frontend
          cache-to: type=gha,mode=max,scope=project-admin-frontend
      - name: Deploy through Systems Manager
        run: infrastructure/scripts/deployment/deploy_runtime_ci.sh
      - name: Verify Cloudflare Access boundary
        run: |
          response_headers="$(mktemp)"
          status="$(curl --silent --show-error --output /dev/null \
            --dump-header "${response_headers}" --write-out '%{http_code}' \
            "${APPLICATION_URL}/")"
          if [[ "${status}" != "302" ]] || ! grep -qi '^location:.*cloudflareaccess.com' "${response_headers}"; then
            echo "Expected Cloudflare Access redirect, received HTTP ${status}." >&2
            cat "${response_headers}" >&2
            exit 1
          fi
          echo "Cloudflare Access is protecting ${APPLICATION_URL}."
