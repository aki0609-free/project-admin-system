spring:
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
    chat:
      client:
        enabled: ${SPRING_AI_CHAT_CLIENT_ENABLED:false}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  batch:
    jdbc:
      initialize-schema: always

  flyway:
    enabled: false

logging:
  level:
    "[org.springframework.security]": INFO
    "[org.hibernate.tool.schema]": INFO

app:
  ai:
    enabled: ${APP_AI_ENABLED:false}
