<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>月次給与明細</title>

    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: "Yu Gothic", "Meiryo", sans-serif;
        background: #f3f4f6;
        color: #111827;
        font-size: 13px;
      }

      .page {
        max-width: 960px;
        margin: 0 auto 28px;
        padding: 24px;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 12px;
      }

      .header {
        text-align: center;
        border-bottom: 3px solid #111827;
        padding-bottom: 10px;
        margin-bottom: 16px;
      }

      .title {
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 0.18em;
      }

      .info {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border: 1px solid #cbd5e1;
        margin-bottom: 16px;
      }

      .info div {
        padding: 8px;
        border-right: 1px solid #cbd5e1;
      }

      .info div:last-child {
        border-right: none;
      }

      .label {
        background: #e5e7eb;
        font-weight: 900;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #e5e7eb;
        padding: 7px;
        border: 1px solid #cbd5e1;
        font-weight: 900;
      }

      td {
        padding: 7px;
        border: 1px solid #e5e7eb;
        height: 24px;
      }

      .right {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .section-head.pay {
        background: #dcfce7;
      }

      .section-head.deduction {
        background: #fee2e2;
      }

      .total-box {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 16px;
      }

      .total-card {
        border: 1px solid #cbd5e1;
      }

      .total-label {
        padding: 8px;
        background: #e5e7eb;
        font-weight: 900;
      }

      .total-value {
        padding: 12px;
        text-align: right;
        font-size: 20px;
        font-weight: 900;
      }

      .net .total-label {
        background: #1d4ed8;
        color: #fff;
      }

      .net .total-value {
        color: #1d4ed8;
      }

      .attendance {
        margin-top: 16px;
      }

      .no-data {
        text-align: center;
        padding: 24px;
        font-weight: 700;
        color: #6b7280;
      }
    </style>
  </head>

  <body>
    <div th:if="${#lists.isEmpty(rows)}" class="page">
      <div class="header">
        <div class="title">給与明細書</div>
      </div>
      <div class="no-data">データがありません</div>
    </div>

    <div
      class="page"
      th:each="row : ${rows}"
      th:with="
        gross=${row['gross_amount'] ?: 0},
        allowance=${row['allowance_total'] ?: 0},
        taxDeduction=${row['tax_deduction_total'] ?: 0},
        deduction=${row['deduction_total'] ?: 0},
        saving=${row['saving_amount'] ?: 0},
        loan=${row['loan_repayment_amount'] ?: 0},
        payTotal=${gross + allowance},
        deductionTotal=${taxDeduction + deduction + saving + loan}
     "
    >
      <div class="header">
        <div class="title">給与明細書</div>
      </div>

      <div class="info">
        <div>
          <div class="label">対象月</div>
          <div th:text="${row['target_month_label']}"></div>
        </div>
        <div>
          <div class="label">支払日</div>
          <div th:text="${row['payment_date_label']}"></div>
        </div>
        <div>
          <div class="label">社員コード</div>
          <div th:text="${row['employee_code']}"></div>
        </div>
        <div>
          <div class="label">氏名</div>
          <div th:text="${row['employee_name']}"></div>
        </div>
      </div>

      <table class="attendance">
        <thead>
          <tr>
            <th>締め期間</th>
            <th>出勤日数</th>
            <th>有休日数</th>
            <th>実働時間</th>
            <th>残業時間</th>
            <th>深夜時間</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td
              th:text="${row['period_start_label']} + ' ～ ' + ${row['period_end_label']}"
            ></td>
            <td
              class="right"
              th:text="${row['work_day_count'] ?: 0} + ' 日'"
            ></td>
            <td
              class="right"
              th:text="${row['paid_leave_days'] ?: 0} + ' 日'"
            ></td>
            <td
              class="right"
              th:text="${row['total_work_hours'] ?: 0} + ' h'"
            ></td>
            <td
              class="right"
              th:text="${row['total_overtime_hours'] ?: 0} + ' h'"
            ></td>
            <td
              class="right"
              th:text="${row['total_night_work_hours'] ?: 0} + ' h'"
            ></td>
          </tr>
        </tbody>
      </table>

      <div class="total-box">
        <div class="total-card">
          <div class="total-label">支給合計</div>
          <div
            class="total-value"
            th:text="${#numbers.formatDecimal(payTotal, 0, 'COMMA', 0, 'POINT')} + ' 円'"
          ></div>
        </div>

        <div class="total-card">
          <div class="total-label">控除合計</div>
          <div
            class="total-value"
            th:text="${#numbers.formatDecimal(deductionTotal, 0, 'COMMA', 0, 'POINT')} + ' 円'"
          ></div>
        </div>

        <div class="total-card net">
          <div class="total-label">差引支給額</div>
          <div
            class="total-value"
            th:text="${#numbers.formatDecimal(row['net_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + ' 円'"
          ></div>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th colspan="2" class="section-head pay">支給</th>
            <th colspan="2" class="section-head deduction">控除</th>
          </tr>
          <tr>
            <th>項目</th>
            <th>金額</th>
            <th>項目</th>
            <th>金額</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>基本支給</td>
            <td
              class="right"
              th:text="${#numbers.formatDecimal(gross, 0, 'COMMA', 0, 'POINT')} + ' 円'"
            ></td>
            <td th:text="${row['tax_deduction_item_name_1']}"></td>
            <td
              class="right"
              th:text="${#numbers.formatDecimal(row['tax_deduction_item_value_1'] ?: 0, 0, 'COMMA', 0, 'POINT')} + ' 円'"
            ></td>
          </tr>

          <tr th:each="i : ${#numbers.sequence(1,10)}">
            <td th:text="${row['allowance_item_name_' + i]}"></td>
            <td
              class="right"
              th:text="${row['allowance_item_name_' + i] == null ? '' : #numbers.formatDecimal(row['allowance_item_value_' + i] ?: 0, 0, 'COMMA', 0, 'POINT') + ' 円'}"
            ></td>

            <td
              th:text="${i < 10 ? row['tax_deduction_item_name_' + (i + 1)] : 'その他控除'}"
            ></td>
            <td
              class="right"
              th:text="${i < 10 && row['tax_deduction_item_name_' + (i + 1)] != null ? #numbers.formatDecimal(row['tax_deduction_item_value_' + (i + 1)] ?: 0, 0, 'COMMA', 0, 'POINT') + ' 円' : ''}"
            ></td>
          </tr>

          <tr th:each="i : ${#numbers.sequence(1,10)}">
            <td></td>
            <td></td>
            <td th:text="${row['deduction_item_name_' + i]}"></td>
            <td
              class="right"
              th:text="${row['deduction_item_name_' + i] == null ? '' : #numbers.formatDecimal(row['deduction_item_value_' + i] ?: 0, 0, 'COMMA', 0, 'POINT') + ' 円'}"
            ></td>
          </tr>

          <tr>
            <td></td>
            <td></td>
            <td>積立</td>
            <td
              class="right"
              th:text="${#numbers.formatDecimal(saving, 0, 'COMMA', 0, 'POINT')} + ' 円'"
            ></td>
          </tr>

          <tr>
            <td></td>
            <td></td>
            <td>貸付返済</td>
            <td
              class="right"
              th:text="${#numbers.formatDecimal(loan, 0, 'COMMA', 0, 'POINT')} + ' 円'"
            ></td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
