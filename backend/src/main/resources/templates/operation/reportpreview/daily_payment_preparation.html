<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>給与支払表</title>

    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: "Yu Gothic", "Meiryo", sans-serif;
        font-size: 13px;
        color: #111827;
        background: #f3f4f6;
      }

      .page {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 14px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 18px;
        padding-bottom: 10px;
        border-bottom: 3px solid #1f2937;
      }

      .title {
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 0.16em;
      }

      .date {
        font-weight: 800;
      }

      .section {
        margin-top: 16px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
      }

      .section-title {
        padding: 9px 12px;
        background: #e5e7eb;
        border-bottom: 1px solid #cbd5e1;
        font-size: 16px;
        font-weight: 900;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        padding: 7px 8px;
        background: #f8fafc;
        border-bottom: 1px solid #cbd5e1;
        border-right: 1px solid #e5e7eb;
        white-space: nowrap;
      }

      td {
        padding: 7px 8px;
        border-bottom: 1px solid #e5e7eb;
        border-right: 1px solid #f1f5f9;
      }

      th:last-child,
      td:last-child {
        border-right: none;
      }

      .center {
        text-align: center;
      }

      .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .cycle {
        text-align: center;
        font-weight: 800;
      }

      .total-line {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-top: 16px;
      }

      .total-card {
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        overflow: hidden;
      }

      .total-label {
        padding: 8px 10px;
        background: #e5e7eb;
        font-weight: 900;
      }

      .total-value {
        padding: 10px;
        text-align: right;
        font-size: 22px;
        font-weight: 900;
        font-variant-numeric: tabular-nums;
      }

      .cash-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
      }

      .cash-item {
        border-right: 1px solid #d1d5db;
      }

      .cash-item:last-child {
        border-right: none;
      }

      .cash-name {
        padding: 8px;
        text-align: center;
        background: #f8fafc;
        border-bottom: 1px solid #d1d5db;
        font-weight: 900;
      }

      .cash-count {
        padding: 10px;
        text-align: center;
        font-size: 20px;
        font-weight: 900;
      }

      @media print {
        body {
          padding: 0;
          background: #fff;
        }

        .page {
          max-width: none;
          border: none;
          border-radius: 0;
        }
      }
    </style>
  </head>

  <body>
    <div
      class="page"
      th:with="summary=${#lists.isEmpty(rows) ? null : rows[0]}"
    >
      <div class="header">
        <div class="title">給与支払表</div>

        <div class="date">
          支払日：
          <span
            th:text="${summary == null ? '' : summary['payment_date_label']}"
          ></span>
        </div>
      </div>

      <div class="total-line">
        <div class="total-card">
          <div class="total-label">当日支払額</div>
          <div
            class="total-value"
            th:text="${summary == null ? '0 円'
                        : #numbers.formatDecimal(summary['total_net_payment_amount'] ?: 0, 0, 'COMMA', 0, 'POINT') + ' 円'}"
          ></div>
        </div>

        <div class="total-card">
          <div class="total-label">銀行引き出し金額</div>
          <div
            class="total-value"
            th:text="${summary == null ? '0 円'
                        : #numbers.formatDecimal(summary['total_net_payment_amount'] ?: 0, 0, 'COMMA', 0, 'POINT') + ' 円'}"
          ></div>
        </div>
      </div>

      <section class="section">
        <div class="section-title">金種内訳</div>

        <div class="cash-grid">
          <div class="cash-item">
            <div class="cash-name">1万円札</div>
            <div
              class="cash-count"
              th:text="${summary == null ? 0 : summary['bill_10000']} + ' 枚'"
            ></div>
          </div>

          <div class="cash-item">
            <div class="cash-name">5千円札</div>
            <div
              class="cash-count"
              th:text="${summary == null ? 0 : summary['bill_5000']} + ' 枚'"
            ></div>
          </div>

          <div class="cash-item">
            <div class="cash-name">1千円札</div>
            <div
              class="cash-count"
              th:text="${summary == null ? 0 : summary['bill_1000']} + ' 枚'"
            ></div>
          </div>

          <div class="cash-item">
            <div class="cash-name">500円玉</div>
            <div
              class="cash-count"
              th:text="${summary == null ? 0 : summary['coin_500']} + ' 枚'"
            ></div>
          </div>

          <div class="cash-item">
            <div class="cash-name">100円玉</div>
            <div
              class="cash-count"
              th:text="${summary == null ? 0 : summary['coin_100']} + ' 枚'"
            ></div>
          </div>

          <div class="cash-item">
            <div class="cash-name">50円玉</div>
            <div
              class="cash-count"
              th:text="${summary == null ? 0 : summary['coin_50']} + ' 枚'"
            ></div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">支払明細</div>

        <table>
          <thead>
            <tr>
              <th>No.</th>
              <th>支払区分</th>
              <th>氏名</th>
              <th>総支給額</th>
              <th>手当合計</th>
              <th>控除合計</th>
              <th>支払額</th>
            </tr>
          </thead>

          <tbody>
            <tr th:if="${#lists.isEmpty(rows)}">
              <td colspan="7" class="center">データがありません</td>
            </tr>

            <th:block th:each="row : ${rows}">
              <tr>
                <td class="center" th:text="${row['employee_code']}"></td>

                <td
                  class="cycle"
                  th:text="${row['payment_cycle'] == 'DAILY' ? '日払い'
                                : row['payment_cycle'] == 'WEEKLY' ? '週払い'
                                : row['payment_cycle'] == 'MONTHLY' ? '月払い'
                                : row['payment_cycle']}"
                ></td>

                <td th:text="${row['employee_name']}"></td>

                <td
                  class="num"
                  th:text="${#numbers.formatDecimal(row['gross_payment_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + ' 円'"
                ></td>

                <td
                  class="num"
                  th:text="${#numbers.formatDecimal(row['allowance_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + ' 円'"
                ></td>

                <td
                  class="num"
                  th:text="${#numbers.formatDecimal(row['deduction_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + ' 円'"
                ></td>

                <td
                  class="num"
                  th:text="${#numbers.formatDecimal(row['net_payment_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + ' 円'"
                ></td>
              </tr>
            </th:block>
          </tbody>
        </table>
      </section>
    </div>
  </body>
</html>
