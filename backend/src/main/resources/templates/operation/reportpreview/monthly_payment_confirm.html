<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>月次入金確認一覧</title>

<style>
body {
  margin: 0;
  padding: 18px;
  font-family: "Yu Gothic", "Meiryo", sans-serif;
  font-size: 11px;
  color: #111827;
  background: #f3f4f6;
}

.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 18px;
  background: #fff;
  border: 1px solid #d1d5db;
  border-radius: 10px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 8px;
  margin-bottom: 12px;
  border-bottom: 3px solid #111827;
}

.title {
  font-size: 21px;
  font-weight: 900;
  letter-spacing: .12em;
}

.month {
  font-size: 13px;
  font-weight: 800;
}

.summary-area {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 12px 0;
}

.summary-card {
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  overflow: hidden;
}

.summary-label {
  padding: 5px 8px;
  background: #e5e7eb;
  font-weight: 900;
}

.summary-value {
  padding: 8px 10px;
  text-align: right;
  font-size: 15px;
  font-weight: 900;
}

.table-wrapper {
  max-height: 680px;
  overflow: auto;
  border: 1px solid #cbd5e1;
}

table {
  min-width: 1280px;
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  background: #fff;
}

th {
  position: sticky;
  top: 0;
  z-index: 2;
  padding: 6px 4px;
  background: #e5e7eb;
  border: 1px solid #cbd5e1;
  font-weight: 900;
  text-align: center;
  white-space: nowrap;
}

td {
  padding: 5px 4px;
  border: 1px solid #e5e7eb;
  vertical-align: top;
}

tbody tr:nth-child(even) {
  background: #f9fafb;
}

.row-paid {
  background: #ecfdf5 !important;
}

.row-unpaid {
  background: #fef2f2 !important;
}

.row-partial {
  background: #fff7ed !important;
}

.row-overpaid {
  background: #fefce8 !important;
}

.customer {
  font-weight: 900;
}

.rule {
  margin-top: 3px;
  font-size: 10px;
  color: #475569;
  line-height: 1.35;
}

.right {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.center {
  text-align: center;
}

.balance {
  font-weight: 900;
  color: #b91c1c;
}

.balance-zero {
  color: #047857;
}

.status {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 999px;
  font-weight: 900;
  font-size: 10px;
}

.status-paid {
  background: #d1fae5;
  color: #065f46;
}

.status-unpaid {
  background: #fee2e2;
  color: #991b1b;
}

.status-partial {
  background: #ffedd5;
  color: #9a3412;
}

.status-overpaid {
  background: #fef9c3;
  color: #854d0e;
}

.note {
  font-size: 10px;
  line-height: 1.35;
  word-break: break-all;
  white-space: pre-wrap;
}

.no-data {
  padding: 24px;
  text-align: center;
  color: #6b7280;
}

@media print {
  body {
    padding: 0;
    background: #fff;
  }

  .page {
    max-width: none;
    border: none;
    border-radius: 0;
  }

  .table-wrapper {
    max-height: none;
    overflow: visible;
    border: none;
  }

  th {
    position: static;
  }

  table {
    min-width: 100%;
  }
}
</style>
</head>

<body>
<div class="page" th:with="summary=${#lists.isEmpty(rows) ? null : rows[0]}">

  <div class="header">
    <div class="title">月次入金確認一覧</div>
    <div class="month">
      対象月：
      <span th:text="${summary == null ? '' : #temporals.format(T(java.time.LocalDate).parse(summary['target_month'] + '-01'), 'yyyy年M月')}"></span>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(rows)}" class="no-data">
    データがありません
  </div>

  <div class="summary-area" th:if="${!#lists.isEmpty(rows)}">
    <div class="summary-card">
      <div class="summary-label">取引金額合計</div>
      <div class="summary-value"
           th:text="${#numbers.formatDecimal(#aggregates.sum(rows.![billing_amount ?: 0]), 0, 'COMMA', 0, 'POINT')} + '円'"></div>
    </div>

    <div class="summary-card">
      <div class="summary-label">請求合計</div>
      <div class="summary-value"
           th:text="${#numbers.formatDecimal(#aggregates.sum(rows.![receivable_amount ?: 0]), 0, 'COMMA', 0, 'POINT')} + '円'"></div>
    </div>

    <div class="summary-card">
      <div class="summary-label">入金合計</div>
      <div class="summary-value"
           th:text="${#numbers.formatDecimal(#aggregates.sum(rows.![collected_amount ?: 0]), 0, 'COMMA', 0, 'POINT')} + '円'"></div>
    </div>

    <div class="summary-card">
      <div class="summary-label">未収金合計</div>
      <div class="summary-value"
           th:text="${#numbers.formatDecimal(#aggregates.sum(rows.![balance_amount ?: 0]), 0, 'COMMA', 0, 'POINT')} + '円'"></div>
    </div>
  </div>

  <div class="table-wrapper" th:if="${!#lists.isEmpty(rows)}">
    <table>
      <thead>
        <tr>
          <th style="width: 190px;">取引先 / 締日・支払日</th>
          <th style="width: 95px;">取引金額</th>
          <th style="width: 80px;">手数料</th>
          <th style="width: 95px;">請求合計</th>
          <th style="width: 95px;">入金予定</th>
          <th style="width: 95px;">入金確認</th>
          <th style="width: 95px;">入金額</th>
          <th style="width: 80px;">相殺</th>
          <th style="width: 95px;">入金合計</th>
          <th style="width: 95px;">未収金</th>
          <th style="width: 80px;">状態</th>
          <th style="width: 180px;">備考</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="row : ${rows}"
            th:classappend="${row['payment_status'] == 'PAID' ? 'row-paid' :
                            row['payment_status'] == 'UNPAID' ? 'row-unpaid' :
                            row['payment_status'] == 'PARTIAL' ? 'row-partial' :
                            row['payment_status'] == 'OVERPAID' ? 'row-overpaid' : ''}">
          <td>
            <div class="customer" th:text="${row['customer_name']}"></div>
            <div class="rule">
              締日：
              <span th:text="${row['closing_day_label']}"></span>
            </div>
            <div class="rule">
              支払日：
              <span th:text="${row['payment_day_label']}"></span>
            </div>
          </td>

          <td class="right" th:text="${#numbers.formatDecimal(row['billing_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + '円'"></td>
          <td class="right" th:text="${#numbers.formatDecimal(row['fee'] ?: 0, 0, 'COMMA', 0, 'POINT')} + '円'"></td>
          <td class="right" th:text="${#numbers.formatDecimal(row['receivable_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + '円'"></td>

          <td class="center"
              th:text="${row['expected_payment_date'] == null ? '' : #temporals.format(row['expected_payment_date'], 'yyyy年M月d日')}"></td>

          <td class="center"
              th:text="${row['confirmed_payment_date'] == null ? '' : #temporals.format(row['confirmed_payment_date'], 'yyyy年M月d日')}"></td>

          <td class="right" th:text="${#numbers.formatDecimal(row['paid_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + '円'"></td>
          <td class="right" th:text="${#numbers.formatDecimal(row['offset_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + '円'"></td>
          <td class="right" th:text="${#numbers.formatDecimal(row['collected_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + '円'"></td>

          <td class="right balance"
              th:classappend="${(row['balance_amount'] ?: 0) == 0 ? ' balance-zero' : ''}"
              th:text="${#numbers.formatDecimal(row['balance_amount'] ?: 0, 0, 'COMMA', 0, 'POINT')} + '円'"></td>

          <td class="center">
            <span th:switch="${row['payment_status']}">
              <span th:case="'UNPAID'" class="status status-unpaid">未入金</span>
              <span th:case="'PARTIAL'" class="status status-partial">一部入金</span>
              <span th:case="'PAID'" class="status status-paid">入金済</span>
              <span th:case="'OVERPAID'" class="status status-overpaid">過入金</span>
              <span th:case="*" th:text="${row['payment_status']}"></span>
            </span>
          </td>

          <td class="note" th:text="${row['note']}"></td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
</body>
</html>
